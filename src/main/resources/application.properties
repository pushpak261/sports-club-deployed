
spring.application.name=sportshub
server.port=${PORT:2424}

# MySQL Database Configuration (uses env vars in production, defaults for local dev)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:cdac}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false

# Run data.sql after Hibernate DDL to fix column types
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Explicitly set MySQL dialect so Hibernate doesn't need a live DB connection to detect it
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# === PERFORMANCE: HikariCP connection pool tuning ===
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# === PERFORMANCE: Hibernate batch inserts/updates ===
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# === PERFORMANCE: HTTP response compression (Gzip) ===
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/css,text/javascript,application/javascript
server.compression.min-response-size=1024

# === PERFORMANCE: Lazy initialization for faster startup ===
spring.main.lazy-initialization=true

# JWT Secret
secreteJwtString=${JWT_SECRET:sportshub123456789sportshub123456789}

# Local file upload directory (images are stored here and served at /images/**)
file.upload-dir=uploads/images

# Allow large image uploads (up to 10 MB per file, 20 MB per request)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# === PERFORMANCE: Hibernate Second-Level Cache ===
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=jcache
spring.jpa.properties.hibernate.javax.cache.provider=com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.generate_statistics=false

# === MONITORING: Spring Boot Actuator ===
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
