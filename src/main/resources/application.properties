
spring.application.name=sportshub
server.port=${PORT:2424}

# MySQL Database Configuration (uses env vars in production, defaults for local dev)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:cdac}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# Run data.sql after Hibernate DDL to fix column types
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Explicitly set MySQL dialect so Hibernate doesn't need a live DB connection to detect it
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Connection pool settings for cloud DB (Aiven closes idle connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JWT Secret
secreteJwtString=${JWT_SECRET:sportshub123456789sportshub123456789}

# Local file upload directory (images are stored here and served at /images/**)
file.upload-dir=uploads/images

# Allow large image uploads (up to 10 MB per file, 20 MB per request)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

spring.mvc.pathmatch.matching-strategy=ant_path_matcher
